<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti 💗</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;

  background:
  linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)),
  url('https://raw.githubusercontent.com/mmmsebas1/parati/main/fondoo.jpg');

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* estrellas */
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  opacity: 0.8;
  animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* card */
.container {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  width: 100%;
  max-width: 300px;

  box-shadow: 
    0 10px 40px rgba(255,77,136,0.3),
    0 0 60px rgba(255,77,136,0.2);
}

h1 {
  color:#ff4d88;
  font-size:20px;
}

p {
  font-size: 15px;
  line-height: 1.5;
  margin: 10px 0;
  color: #444;
}

/* botón */
button {
  margin-top: 12px;
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 20px;
  background: linear-gradient(45deg,#ff4d88,#ff7aa2);
  color: white;
  font-size: 16px;
  cursor: pointer;

  animation: latido 1.5s infinite;
  box-shadow: 0 0 20px #ff85a2;

  transition: 0.3s;
}

button:hover {
  transform: scale(1.07);
  box-shadow: 0 0 30px #ff4d88;
}

@keyframes latido {
  0%{transform:scale(1);}
  50%{transform:scale(1.05);}
  100%{transform:scale(1);}
}

/* corazones */
.heart {
  position:absolute;
  color:#ff4d88;
  animation:float 6s linear infinite;
}

@keyframes float {
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* cursor */
#texto::after {
  content:"|";
  animation:blink 1s infinite;
}

@keyframes blink {
  50%{opacity:0;}
}

/* textarea */
textarea {
  width:100%;
  height:90px;
  border-radius:12px;
  border:none;
  padding:12px;
  margin-top:10px;
  font-size:15px;
  resize:none;
  outline:none;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

body::before {
  content: "";
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, #ff4d8840, transparent);
  filter: blur(80px);
  top: 30%;
  left: 50%;
  transform: translateX(-50%);
}

#intro {
  position: fixed;
  inset: 0;
  background: white;
  color: #ff4d88;

  display: flex;
  justify-content: center;
  align-items: center;

  text-align: center;
  z-index: 9999;

  font-family: 'Arial', sans-serif;
}

#introTexto {
  font-size: 26px;
  max-width: 280px;
  line-height: 1.4;
}

/* cursor suave */
#introTexto::after {
  content: "|";
  margin-left: 3px;
  animation: blink 1s infinite;
  opacity: 0.6;
}

@keyframes blink {
  50% {opacity: 0;}
}#intro {
  position: fixed;
  inset: 0;
  background: linear-gradient(to bottom, #ffffff, #fff0f5);
  
  display: flex;
  justify-content: center;
  align-items: center;
  
  text-align: center;
  z-index: 9999;
}

#introTexto {
  font-size: 32px;
  max-width: 320px;
  line-height: 1.5;

  color: #ff4d88;

  text-shadow:
    0 0 10px rgba(255, 77, 136, 0.4),
    0 0 20px rgba(255, 77, 136, 0.3),
    0 0 30px rgba(255, 77, 136, 0.2);

  opacity: 0;
  transform: translateY(25px) scale(0.95);

  animation: aparecerTexto 1s ease forwards;
}

/* brillo suave */
#introTexto {
  text-shadow: 0 0 15px rgba(255, 77, 136, 0.3);
}

/* cursor */
#introTexto::after {
  content: "|";
  margin-left: 3px;
  animation: blink 1s infinite;
  opacity: 0.6;
}

@keyframes blink {
  50% {opacity: 0;}
}

@keyframes aparecerTexto {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

</style>
</head>

<body>

  <div id="intro">
  <h1 id="introTexto"></h1>
</div>

<div class="container">
  <h1 id="titulo"></h1>
  <p id="texto"></p>
  <button id="btn" onclick="activarAudio(); siguiente()">ver más</button>
</div>

<audio id="musica" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>

<script>

  function introAnimacion() {
  const texto = document.getElementById("introTexto");

  let mensaje = "Para la más hermosaaa…\ny esa eres tú, Scar ❤️";
  let i = 0;

  function escribir() {
    if (i < mensaje.length) {
      texto.textContent += mensaje[i];
      i++;
      setTimeout(escribir, 50);
    } else {
      setTimeout(() => {
  let intro = document.getElementById("intro");

  intro.style.transition = "1.5s ease";
  intro.style.opacity = "0";
  intro.style.transform = "scale(1.05)";

  setTimeout(() => {
    intro.style.display = "none";
  }, 1500);
}, 2500);
    }
  }

  escribir();
}

// ejecutar intro
window.addEventListener("load", introAnimacion);

// 🎵 audio
let musicaIniciada = false;
function activarAudio() {
  if (!musicaIniciada) {
    let m = document.getElementById("musica");
    m.volume = 0;

    m.play().then(()=>{
      let v=0;
      let f=setInterval(()=>{
        if(v<0.3){v+=0.02;m.volume=v;}
        else clearInterval(f);
      },200);
    }).catch(()=>{});

    musicaIniciada = true;
  }
}

// 📩 AVISO APERTURA (SE MANTIENE)
window.addEventListener("load",()=>{
  fetch("https://formspree.io/f/xnjrvkrl",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mensaje:"👀 Abrió la página"})
  });
});

// ❤️ corazones
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="❤️";
  h.style.left=Math.random()*100+"vw";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
},900);

// ⭐ estrellas
function estrellas(){
  for(let i=0;i<40;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
  }
}

// ✍️ escribir
function escribir(t,e,v=40){
  let i=0;e.textContent="";
  (function w(){
    if(i<t.length){e.textContent+=t[i++];setTimeout(w,v);}
  })();
}

// 💗 mensajes
let pasos=[
"No soy muy bueno diciendo esto…",
"pero contigo es diferente…",
"no sé cómo lo haces…",
"pero me gusta hablar contigo",
"me gusta cómo eres…",
"me gusta cómo me haces sentir…",
"y sin darme cuenta…",
"empecé a pensarte más de lo normal…",
"y eso no me pasa con cualquiera…",
"te volviste importante para mí",
"y no lo hice para impresionarte…",
"ni para decir algo bonito nada más…",
"lo hice porque eres tú…",
"y contigo todo se siente diferente…",
"y vales la pena… más de lo que imaginas",
"esto era solo para ti…",
"solo quería que lo supieras antes de dormir…",
"que descanses bonito…",
"y que sueñes con algo lindo… ojalá conmigo"
];

let i=0;

function siguiente(){
  let t=document.getElementById("texto");
  let b=document.getElementById("btn");

  if(i===pasos.length-3){
    document.body.style.background="linear-gradient(#0f0f1a,#1a1a2e)";
    estrellas();
  }

  if(i===pasos.length-2){
    document.getElementById("musica").volume=0.15;
  }

  if(i===pasos.length-1){
    b.innerText="buenas noches hermosa ❤️";
  }

  if(i<pasos.length){
    escribir(pasos[i],t,i>10?55:35);
    i++;
  }else{
    b.style.display="none";

    setTimeout(()=>{
      let c=document.querySelector(".container");
      c.innerHTML+=`
      <p style="font-size:14px;opacity:0.7;">si quieres dejarme algo</p>
      <form id="f" action="https://formspree.io/f/xnjrvkrl" method="POST">
        <textarea name="mensaje" required></textarea>
        <button>enviar 💌</button>
      </form>`;
      
      document.getElementById("f").onsubmit=e=>{
        e.preventDefault();
        fetch(e.target.action,{method:"POST",body:new FormData(e.target)})
        .then(()=>e.target.innerHTML="💗 gracias por escribir");
      };

    },2000);
  }
}

// iniciar
siguiente();

</script>

</body>
</html>
